<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies - Mini LinkedIn</title>
  <meta name="description" content="Discover and follow companies on Mini LinkedIn.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-50">

  <div id="navbar-container"></div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-900">Explore Companies</h1>
      <button onclick="openCreateCompanyModal()" class="btn btn-primary btn-sm">
        Add Company
      </button>
    </div>

    <div id="companies-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Companies will be loaded here -->
      <div class="card p-6 animate-pulse">
        <div class="flex gap-4">
          <div class="w-16 h-16 bg-gray-200 rounded"></div>
          <div class="flex-1 space-y-2">
            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
            <div class="h-3 bg-gray-200 rounded w-1/3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div id="companies-empty" style="display:none" class="text-center py-20 card mt-6">
      <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
         <svg width="32" height="32" fill="gray" viewBox="0 0 24 24"><path d="M21 21H3V5h18v16zm-2-2V7H5v12h14zM7 9h10v2H7V9zm0 4h10v2H7v-2z"/></svg>
      </div>
      <h3 class="text-lg font-semibold text-gray-800">No companies found</h3>
      <p class="text-sm text-gray-500 mt-2">Be the first to add a company to the platform!</p>
      <button onclick="openCreateCompanyModal()" class="btn btn-primary mt-4">Add Company</button>
    </div>
  </main>

  <!-- CREATE COMPANY MODAL -->
  <div id="create-company-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 class="font-semibold text-lg">Add a Company</h2>
        <button onclick="closeCreateCompanyModal()" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="company-form" class="space-y-4">
          <div>
            <label class="input-label">Company Name *</label>
            <input type="text" id="comp-name" class="input" placeholder="e.g. Google" required>
          </div>
          <div>
            <label class="input-label">Industry *</label>
            <input type="text" id="comp-industry" class="input" placeholder="e.g. Technology" required>
          </div>
          <div>
            <label class="input-label">Website</label>
            <input type="url" id="comp-website" class="input" placeholder="https://example.com">
          </div>
          <div>
            <label class="input-label">Location</label>
            <input type="text" id="comp-location" class="input" placeholder="e.g. Mountain View, CA">
          </div>
          <div>
            <label class="input-label">Description</label>
            <textarea id="comp-desc" class="input h-24" placeholder="Tell us about the company..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button onclick="closeCreateCompanyModal()" class="btn btn-ghost">Cancel</button>
        <button onclick="submitCompany()" class="btn btn-primary" id="submit-comp-btn">Save Company</button>
      </div>
    </div>
  </div>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    async function initCompanies() {
      document.getElementById('navbar-container').innerHTML = generateNavbar('');
      const user = await checkAuth();
      if (!user) return;
      
      loadCompanies();
      updateNotificationBadge();
    }

    async function loadCompanies() {
      const grid = document.getElementById('companies-grid');
      const empty = document.getElementById('companies-empty');
      
      try {
        const companies = await api.getCompanies();
        if (companies.length === 0) {
          grid.innerHTML = '';
          empty.style.display = 'block';
          return;
        }

        empty.style.display = 'none';
        grid.innerHTML = companies.map(comp => `
          <div class="card p-6 flex flex-col hover:shadow-lg transition">
            <div class="flex items-start gap-4 mb-4">
              <div class="w-16 h-16 rounded bg-blue-50 flex items-center justify-center flex-shrink-0 text-blue-600 font-bold text-2xl">
                ${comp.name[0].toUpperCase()}
              </div>
              <div class="flex-1 min-w-0">
                <h3 class="font-bold text-lg text-gray-900 truncate">${escapeHtml(comp.name)}</h3>
                <p class="text-sm text-gray-500 truncate">${escapeHtml(comp.industry)}</p>
                <p class="text-xs text-gray-400 mt-1">${escapeHtml(comp.location || 'Global')}</p>
              </div>
            </div>
            <p class="text-sm text-gray-600 mb-4 line-clamp-3 h-15">${escapeHtml(comp.description || 'No description available.')}</p>
            <div class="mt-auto pt-4 border-t border-gray-100 flex items-center justify-between">
              <span class="text-xs text-gray-500">${comp.followers.length} followers</span>
              <button onclick="toggleFollow('${comp._id}', this)" class="btn ${comp.followers.includes(currentUser._id) ? 'btn-outline' : 'btn-primary'} btn-sm">
                ${comp.followers.includes(currentUser._id) ? 'Following' : 'Follow'}
              </button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        showToast('Failed to load companies', 'error');
      }
    }

    async function toggleFollow(compId, btn) {
      const originalText = btn.innerText;
      btn.disabled = true;
      btn.innerText = '...';

      try {
        const result = await api.toggleFollowCompany(compId);
        btn.innerText = result.isFollowing ? 'Following' : 'Follow';
        btn.className = `btn ${result.isFollowing ? 'btn-outline' : 'btn-primary'} btn-sm`;
        
        // Update follower count in UI
        const countSpan = btn.parentElement.querySelector('span');
        let count = parseInt(countSpan.innerText);
        countSpan.innerText = `${result.isFollowing ? count + 1 : count - 1} followers`;
      } catch (error) {
        showToast('Action failed', 'error');
        btn.innerText = originalText;
      } finally {
        btn.disabled = false;
      }
    }

    function openCreateCompanyModal() {
      document.getElementById('create-company-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeCreateCompanyModal() {
      document.getElementById('create-company-modal').style.display = 'none';
      document.body.style.overflow = '';
    }

    async function submitCompany() {
      const name = document.getElementById('comp-name').value;
      const industry = document.getElementById('comp-industry').value;
      const website = document.getElementById('comp-website').value;
      const location = document.getElementById('comp-location').value;
      const description = document.getElementById('comp-desc').value;

      if (!name || !industry) {
        showToast('Name and Industry are required', 'error');
        return;
      }

      const btn = document.getElementById('submit-comp-btn');
      btn.disabled = true;
      btn.innerText = 'Saving...';

      try {
        await api.createCompany({ name, industry, website, location, description });
        showToast('Company added! 🏢', 'success');
        closeCreateCompanyModal();
        loadCompanies();
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerText = 'Save Company';
      }
    }

    initCompanies();
  </script>
</body>
</html>
