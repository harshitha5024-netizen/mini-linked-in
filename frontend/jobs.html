<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs - Mini LinkedIn</title>
  <meta name="description" content="Find your next career opportunity. Explore jobs with tailored requirements and company names.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

      <!-- LEFT SIDEBAR - Jobs Filter -->
      <aside class="lg:col-span-3">
        <div class="card p-4 sticky top-20">
          <h3 class="font-semibold text-gray-900 mb-4">Job Management</h3>
          <button onclick="openPostJobModal()" class="btn btn-primary w-full mb-3">
            Post a Job
          </button>
          <div class="border-t border-gray-100 pt-3">
            <h4 class="text-xs font-semibold text-gray-500 uppercase mb-2">My Preferences</h4>
            <div class="space-y-2">
              <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-600 hover:text-blue-600 transition">
                <input type="checkbox" checked class="rounded border-gray-300">
                <span>Remote Only</span>
              </label>
            </div>
          </div>
        </div>
      </aside>

      <!-- CENTER - Jobs Feed -->
      <div class="lg:col-span-9">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold text-gray-900">Recommended Jobs</h2>
          <span class="text-sm text-gray-500" id="jobs-count">Loading jobs...</span>
        </div>

        <div id="jobs-container" class="space-y-4">
          <!-- Skeleton items -->
          <div class="card p-6 animate-pulse">
            <div class="flex gap-4">
              <div class="w-12 h-12 bg-gray-200 rounded"></div>
              <div class="flex-1 space-y-2">
                <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                <div class="h-3 bg-gray-200 rounded w-1/3"></div>
                <div class="h-3 bg-gray-200 rounded w-1/2"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Empty State -->
        <div class="card p-12 text-center" id="empty-jobs" style="display:none">
          <div class="w-20 h-20 mx-auto mb-4 rounded-full flex items-center justify-center bg-gray-100">
            <svg width="32" height="32" fill="gray" viewBox="0 0 24 24"><path d="M20.25 14.15v4.25c0 .621-.504 1.125-1.125 1.125H4.875c-.621 0-1.125-.504-1.125-1.125v-4.25m16.5 0a2.25 2.25 0 00-2.25-2.25H4.875a2.25 2.25 0 00-2.25 2.25m16.5 0V9.45c0-.621-.504-1.125-1.125-1.125H4.875a1.125 1.125 0 00-1.125 1.125v4.7h16.5z"/></svg>
          </div>
          <h3 class="text-lg font-semibold text-gray-800 mb-2">No jobs found</h3>
          <p class="text-sm text-gray-500 mb-4">Check back later for new opportunities or try changing your filters.</p>
        </div>
      </div>
    </div>
  </main>

  <!-- POST JOB MODAL -->
  <div id="post-job-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 class="font-semibold text-lg">Post a New Job</h2>
        <button onclick="closePostJobModal()" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 transition">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="job-form" class="space-y-4">
          <div>
            <label class="input-label">Job Title</label>
            <input type="text" id="job-title" class="input" placeholder="e.g. Senior Frontend Engineer" required>
          </div>
          <div>
            <label class="input-label">Company Name</label>
            <input type="text" id="job-company" class="input" placeholder="e.g. Google, Meta, Startup Inc." required>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="input-label">Location</label>
              <input type="text" id="job-location" class="input" placeholder="e.g. Remote, Bangalore" required>
            </div>
            <div>
              <label class="input-label">Job Type</label>
              <select id="job-type" class="input">
                <option value="Full-time">Full-time</option>
                <option value="Part-time">Part-time</option>
                <option value="Contract">Contract</option>
                <option value="Internship">Internship</option>
                <option value="Remote">Remote</option>
              </select>
            </div>
          </div>
          <div>
            <label class="input-label">Job Description</label>
            <textarea id="job-desc" class="input h-32" placeholder="Describe the role and responsibilities..." required></textarea>
          </div>
          <div>
            <label class="input-label">Requirements (comma separated)</label>
            <input type="text" id="job-reqs" class="input" placeholder="e.g. React, Node.js, 3+ years experience">
          </div>
          <div>
            <label class="input-label">Salary (Optional)</label>
            <input type="text" id="job-salary" class="input" placeholder="e.g. $80k - $120k">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button onclick="closePostJobModal()" class="btn btn-ghost">Cancel</button>
        <button onclick="submitJob()" class="btn btn-primary" id="post-job-btn">
          Post Job
        </button>
      </div>
    </div>
  </div>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    async function initJobs() {
      document.getElementById('navbar-container').innerHTML = generateNavbar('jobs');
      const user = await checkAuth();
      if (!user) return;
      
      loadJobs();
      updateNotificationBadge();
    }

    async function loadJobs() {
      const container = document.getElementById('jobs-container');
      const countEl = document.getElementById('jobs-count');
      
      try {
        const jobs = await api.getJobs();
        countEl.textContent = `${jobs.length} jobs available`;
        
        if (jobs.length === 0) {
          container.innerHTML = '';
          document.getElementById('empty-jobs').style.display = 'block';
          return;
        }

        document.getElementById('empty-jobs').style.display = 'none';
        container.innerHTML = jobs.map(job => createJobCard(job)).join('');
      } catch (error) {
        showToast('Failed to load jobs', 'error');
        container.innerHTML = '<p class="text-center py-8 text-gray-500">Error loading jobs. Please try again.</p>';
      }
    }

    function createJobCard(job) {
      return `
        <div class="card p-6 flex flex-col md:flex-row gap-4 hover:shadow-lg transition cursor-pointer">
          <div class="w-12 h-12 rounded bg-blue-100 flex items-center justify-center flex-shrink-0">
             <span class="text-blue-600 font-bold text-xl">${job.companyName[0].toUpperCase()}</span>
          </div>
          <div class="flex-1">
            <h3 class="font-bold text-lg text-blue-600 hover:underline mb-0.5">${escapeHtml(job.title)}</h3>
            <p class="text-sm text-gray-800 font-semibold mb-1">${escapeHtml(job.companyName)}</p>
            <p class="text-xs text-gray-500 mb-3">${escapeHtml(job.location)} • ${job.jobType} • ${timeAgo(job.createdAt)}</p>
            
            <div class="flex flex-wrap gap-2 mb-3">
              ${job.requirements.map(req => `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded">${escapeHtml(req)}</span>`).join('')}
            </div>
            
            <p class="text-sm text-gray-600 line-clamp-2">${escapeHtml(job.description)}</p>
          </div>
          <div class="flex-shrink-0 flex items-start">
             <button class="btn btn-outline btn-sm">Apply Now</button>
          </div>
        </div>
      `;
    }

    function openPostJobModal() {
      document.getElementById('post-job-modal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closePostJobModal() {
      document.getElementById('post-job-modal').style.display = 'none';
      document.body.style.overflow = '';
    }

    async function submitJob() {
      const title = document.getElementById('job-title').value;
      const companyName = document.getElementById('job-company').value;
      const location = document.getElementById('job-location').value;
      const description = document.getElementById('job-desc').value;
      const requirements = document.getElementById('job-reqs').value;
      const jobType = document.getElementById('job-type').value;
      const salary = document.getElementById('job-salary').value;

      if (!title || !companyName || !location || !description) {
        showToast('Please fill in all required fields', 'error');
        return;
      }

      const btn = document.getElementById('post-job-btn');
      btn.disabled = true;
      btn.textContent = 'Posting...';

      try {
        await api.createJob({
          title, companyName, location, description, requirements, jobType, salary
        });
        showToast('Job posted successfully! 💼', 'success');
        closePostJobModal();
        loadJobs();
      } catch (error) {
        showToast('Failed to post job', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Post Job';
      }
    }

    initJobs();
  </script>
</body>
</html>
