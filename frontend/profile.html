<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Mini LinkedIn</title>
  <meta name="description" content="View professional profiles on Mini LinkedIn.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <!-- Profile Content -->
  <main class="max-w-4xl mx-auto px-4 py-6">
    <!-- Profile Card -->
    <div class="card overflow-hidden mb-6 animate-fade-in-up" id="profile-card">
      <!-- Banner -->
      <div class="profile-banner">
        <div class="absolute inset-0" style="background: linear-gradient(135deg, rgba(10,102,194,0.9), rgba(0,115,177,0.8), rgba(0,160,220,0.9))"></div>
        <!-- Decorative circles -->
        <div class="absolute top-4 right-8 w-24 h-24 rounded-full opacity-10" style="background:white"></div>
        <div class="absolute bottom-8 left-12 w-16 h-16 rounded-full opacity-10" style="background:white"></div>
      </div>

      <!-- Profile Info -->
      <div class="px-6 pb-6">
        <!-- Avatar -->
        <div class="-mt-16 mb-4 flex items-end justify-between">
          <div id="profile-avatar" class="w-32 h-32 rounded-full border-4 border-white shadow-lg bg-white overflow-hidden flex items-center justify-center" style="background:var(--accent-gradient);color:white;font-weight:700;font-size:36px">
            <div class="spinner spinner-lg"></div>
          </div>
          <div id="edit-btn-container"></div>
        </div>

        <!-- Name & Headline -->
        <h1 class="text-2xl font-bold text-gray-900" id="profile-name">Loading...</h1>
        <p class="text-base text-gray-600 mt-1" id="profile-headline"></p>

        <!-- Location -->
        <div class="flex items-center gap-4 mt-2 text-sm text-gray-500" id="profile-meta">
          <span id="profile-location" class="flex items-center gap-1" style="display:none">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
            <span id="profile-location-text"></span>
          </span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Left Column -->
      <div class="lg:col-span-2 space-y-6">
        <!-- About / Bio -->
        <div class="card p-6 animate-fade-in-up stagger-1" id="about-section" style="display:none">
          <h2 class="text-lg font-semibold text-gray-900 mb-3">About</h2>
          <p class="text-sm text-gray-700 whitespace-pre-line leading-relaxed" id="profile-bio"></p>
        </div>

        <!-- Experience -->
        <div class="card p-6 animate-fade-in-up stagger-2" id="experience-section" style="display:none">
          <h2 class="text-lg font-semibold text-gray-900 mb-3 flex items-center gap-2">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
            Experience
          </h2>
          <div class="text-sm text-gray-700 whitespace-pre-line" id="profile-experience"></div>
        </div>

        <!-- Education -->
        <div class="card p-6 animate-fade-in-up stagger-3" id="education-section" style="display:none">
          <h2 class="text-lg font-semibold text-gray-900 mb-3 flex items-center gap-2">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5"/></svg>
            Education
          </h2>
          <div class="text-sm text-gray-700 whitespace-pre-line" id="profile-education"></div>
        </div>
      </div>

      <!-- Right Column -->
      <div class="space-y-6">
        <!-- Skills -->
        <div class="card p-6 animate-fade-in-up stagger-2" id="skills-section" style="display:none">
          <h2 class="text-lg font-semibold text-gray-900 mb-3 flex items-center gap-2">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
            Skills
          </h2>
          <div class="flex flex-wrap gap-2" id="profile-skills"></div>
        </div>

        <!-- Skill Match Suggestions (only on own profile) -->
        <div class="card p-6 animate-fade-in-up stagger-3" id="profile-suggestions" style="display:none">
          <h3 class="font-semibold text-sm text-gray-900 mb-3 flex items-center gap-2">
            <svg width="16" height="16" fill="var(--linkedin-green)" viewBox="0 0 24 24"><path d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
            People with Similar Skills
          </h3>
          <div id="profile-suggestions-list"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="/js/firebase-config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    // Get profile ID from URL params (if viewing another user)
    const urlParams = new URLSearchParams(window.location.search);
    const profileId = urlParams.get('id');

    async function initProfile() {
      // Insert navbar
      document.getElementById('navbar-container').innerHTML = generateNavbar('profile');

      // Check authentication
      const loggedInUser = await checkAuth();
      if (!loggedInUser) return;

      // Load profile data
      let profileUser;
      let isOwnProfile;

      if (profileId && profileId !== loggedInUser._id) {
        // Viewing another user's profile
        try {
          profileUser = await api.getUser(profileId);
          isOwnProfile = false;
        } catch (error) {
          showToast('User not found', 'error');
          return;
        }
      } else {
        // Viewing own profile
        profileUser = loggedInUser;
        isOwnProfile = true;
      }

      renderProfile(profileUser, isOwnProfile);

      // Load suggestions if own profile
      if (isOwnProfile && profileUser.skills && profileUser.skills.length > 0) {
        loadProfileSuggestions(profileUser._id);
      }

      // Update notification badge
      updateNotificationBadge();
    }

    /**
     * Render the profile page
     */
    function renderProfile(user, isOwnProfile) {
      // Update page title
      document.title = `${user.name} - Mini LinkedIn`;

      // Avatar
      const avatarEl = document.getElementById('profile-avatar');
      if (user.profileImage) {
        avatarEl.innerHTML = `<img src="${user.profileImage}" alt="${user.name}" class="w-full h-full object-cover">`;
        avatarEl.style.background = 'white';
      } else {
        avatarEl.textContent = getInitials(user.name);
      }

      // Basic info
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-headline').textContent = user.headline || '';

      // Location & Professional Info
      const metaContainer = document.getElementById('profile-meta');
      metaContainer.innerHTML = ''; // Clear loading

      if (user.location) {
        metaContainer.insertAdjacentHTML('beforeend', `
          <span class="flex items-center gap-1">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
            <span>${escapeHtml(user.location)}</span>
          </span>
        `);
      }

      if (user.currentCompany || user.industry) {
        metaContainer.insertAdjacentHTML('beforeend', `
          <span class="text-gray-300">•</span>
          <span class="flex items-center gap-1">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12v18H3V3z"/></svg>
            <span>${escapeHtml(user.currentCompany || user.industry)}</span>
          </span>
        `);
      }

      // Actions container
      const actionContainer = document.getElementById('edit-btn-container');

      // Edit button (only for own profile)
      if (isOwnProfile) {
        actionContainer.innerHTML = `
          <a href="/edit-profile" class="btn btn-outline btn-sm">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
            Edit Profile
          </a>`;
      } else {
        // Connect button (for other users)
        const isConnected = user.connections && user.connections.some(c => 
          (c._id || c) === currentUser._id
        );
        
        actionContainer.innerHTML = `
          <button onclick="toggleConnection('${user._id}')" class="btn ${isConnected ? 'btn-outline' : 'btn-primary'} btn-sm" id="connect-btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="${isConnected ? 'M5 13l4 4L19 7' : 'M12 4.5v15m7.5-7.5h-15'}" />
            </svg>
            <span id="connect-text">${isConnected ? 'Connected' : 'Connect'}</span>
          </button>`;
      }

      // Update meta info (connections count)
      const connectionsCount = user.connections ? user.connections.length : 0;
      metaContainer.insertAdjacentHTML('beforeend', `
        <span class="flex items-center gap-1">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
          <span class="font-semibold" id="conn-count">${connectionsCount}</span> connections
        </span>
      `);

      // About / Bio
      if (user.bio) {
        document.getElementById('about-section').style.display = 'block';
        document.getElementById('profile-bio').textContent = user.bio;
      }

      // Experience
      if (user.experience) {
        document.getElementById('experience-section').style.display = 'block';
        document.getElementById('profile-experience').textContent = user.experience;
      }

      // Education
      if (user.education) {
        document.getElementById('education-section').style.display = 'block';
        document.getElementById('profile-education').textContent = user.education;
      }

      // Skills
      if (user.skills && user.skills.length > 0) {
        document.getElementById('skills-section').style.display = 'block';
        document.getElementById('profile-skills').innerHTML = user.skills
          .map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`)
          .join('');
      }
    }

    /**
     * Load skill match suggestions for the profile
     */
    async function loadProfileSuggestions(userId) {
      try {
        const suggestions = await api.getSuggestions(userId);
        if (suggestions.length === 0) return;

        document.getElementById('profile-suggestions').style.display = 'block';
        document.getElementById('profile-suggestions-list').innerHTML = suggestions.slice(0, 5).map(s => `
          <a href="/profile?id=${s._id}" class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 transition mb-1 no-underline">
            <div class="flex-shrink-0">${getAvatarHTML(s, 'profile-avatar-sm')}</div>
            <div class="flex-1 min-w-0">
              <p class="font-semibold text-xs text-gray-900 truncate">${escapeHtml(s.name)}</p>
              <div class="flex flex-wrap gap-1 mt-0.5">
                ${s.matchingSkills.map(ms => `<span class="skill-tag skill-tag-match" style="font-size:10px;padding:1px 6px">${escapeHtml(ms)}</span>`).join('')}
              </div>
            </div>
          </a>
        `).join('');
      } catch (error) {
        // Silently fail
      }
    }

    /**
     * Toggle connection with a user
     */
    let isConnecting = false;
    async function toggleConnection(userId) {
      if (isConnecting) return;
      isConnecting = true;

      const btn = document.getElementById('connect-btn');
      const text = document.getElementById('connect-text');
      const countEl = document.getElementById('conn-count');
      const originalHtml = btn.innerHTML;

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner spinner-sm"></div>';

      try {
        const result = await api.connectUser(userId);
        const isConnected = result.isConnected;

        // Update button
        btn.className = `btn ${isConnected ? 'btn-outline' : 'btn-primary'} btn-sm`;
        btn.innerHTML = `
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="${isConnected ? 'M5 13l4 4L19 7' : 'M12 4.5v15m7.5-7.5h-15'}" />
          </svg>
          <span id="connect-text">${isConnected ? 'Connected' : 'Connect'}</span>
        `;

        // Update count
        let count = parseInt(countEl.textContent);
        countEl.textContent = isConnected ? count + 1 : count - 1;

        showToast(result.message, 'success');
      } catch (error) {
        showToast('Failed to update connection', 'error');
        btn.innerHTML = originalHtml;
      } finally {
        btn.disabled = false;
        isConnecting = false;
      }
    }

    initProfile();
  </script>
</body>
</html>
