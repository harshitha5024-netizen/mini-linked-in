<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Mini LinkedIn - Create Your Account</title>
  <meta name="description" content="Create your Mini LinkedIn account and start building your AI-enhanced professional profile.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <a href="/" class="block text-center no-underline mb-2">
        <div class="flex items-center justify-center gap-2 mb-2">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:var(--accent-gradient)">
            <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M19 3a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14m-.5 15.5v-5.3a3.26 3.26 0 00-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 011.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 001.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 00-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
          </div>
        </div>
        <h1 class="auth-logo">Join Mini LinkedIn</h1>
      </a>
      <p class="auth-subtitle">Make the most of your professional life.</p>

      <!-- Signup Form -->
      <form id="signup-form" class="space-y-4">
        <div>
          <label class="input-label" for="name">Full Name</label>
          <input type="text" id="name" class="input" placeholder="John Doe" required autocomplete="name">
        </div>

        <div>
          <label class="input-label" for="email">Email Address</label>
          <input type="email" id="email" class="input" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div>
          <label class="input-label" for="password">Password</label>
          <input type="password" id="password" class="input" placeholder="6+ characters" required autocomplete="new-password" minlength="6">
        </div>

        <div>
          <label class="input-label" for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="input" placeholder="Repeat your password" required autocomplete="new-password" minlength="6">
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-200 animate-fade-in-down"></div>

        <!-- Success Message -->
        <div id="success-message" class="hidden bg-green-50 text-green-700 text-sm p-3 rounded-lg border border-green-200 animate-fade-in-down"></div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="signup-btn">
          <span id="signup-text">Create Account</span>
          <div class="spinner spinner-sm" id="signup-spinner" style="display:none;border-top-color:white;border-color:rgba(255,255,255,0.3)"></div>
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500">
          Already on Mini LinkedIn? 
          <a href="/login" class="font-semibold" style="color:var(--linkedin-blue)">Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/firebase-config.js"></script>
  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = '/feed';
    });

    // Handle signup form submission
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorDiv = document.getElementById('error-message');
      const successDiv = document.getElementById('success-message');
      const signupBtn = document.getElementById('signup-btn');
      const signupText = document.getElementById('signup-text');
      const signupSpinner = document.getElementById('signup-spinner');

      // Validate passwords match
      if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match.';
        errorDiv.classList.remove('hidden');
        return;
      }

      // Show loading state
      signupBtn.disabled = true;
      signupText.textContent = 'Creating account...';
      signupSpinner.style.display = 'inline-block';
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      try {
        // Create account with Firebase
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        
        // Update Firebase profile display name
        await userCredential.user.updateProfile({ displayName: name });

        // Create user profile in MongoDB
        const token = await userCredential.user.getIdToken();
        const response = await fetch('/api/users', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ name, email })
        });

        if (!response.ok) {
          throw new Error('Failed to create profile');
        }

        // Show success message
        successDiv.textContent = 'Account created successfully! Redirecting...';
        successDiv.classList.remove('hidden');

        // Redirect to feed
        setTimeout(() => {
          window.location.href = '/feed';
        }, 1000);

      } catch (error) {
        let message = 'Sign up failed. Please try again.';
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            message = 'An account with this email already exists. Try signing in.';
            break;
          case 'auth/invalid-email':
            message = 'Please enter a valid email address.';
            break;
          case 'auth/weak-password':
            message = 'Password should be at least 6 characters long.';
            break;
        }

        errorDiv.textContent = message;
        errorDiv.classList.remove('hidden');

        // Reset button
        signupBtn.disabled = false;
        signupText.textContent = 'Create Account';
        signupSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
